apis:
- aid: bok-financial:bok-financial-data-access
  name: BOK Financial Consumer-Permissioned Account Access (via Aggregators)
  description: >-
    Consumer-permissioned access to BOK Financial deposit-account data — balances,
    transactions, account and identity verification — is available to fintech
    applications through third-party data aggregators rather than a first-party
    BOK Financial API. BOK Financial customer accounts are reachable via Plaid's
    data network (confirmed coverage), which brokers the consumer's online-banking
    consent. BOK Financial does not publish an OpenAPI/Swagger definition, public
    sandbox, or self-serve developer keys for this surface; access terms and
    onboarding are governed by the aggregator, not by a documented BOK Financial
    developer program.
