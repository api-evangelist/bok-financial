auth_model:
  first_party: none-documented
  note: >-
    No documented first-party auth (no OAuth2/OIDC/API-key/mTLS developer flow is
    published). Consumer data-access auth is delegated to the aggregator's
    consent flow (Plaid), which uses the consumer's BOK online-banking credentials
    / permissioned consent.
open_finance_posture:
  aggregator_access:
    plaid: confirmed
    note: >-
      BOK Financial deposit accounts are reachable through Plaid's data network
      (third-party coverage listings confirm auth/balance/transactions/identity).
      Connection method (direct API vs. credential-based) is set by the aggregator
      and not disclosed by BOK Financial.
  akoya: unverified
  mx_finicity: unverified
  fdx_participation: not-publicly-documented
  cfpb_1033_posture: >-
    No public statement located on BOK Financial's 1033 personal-financial-data-
    rights data-access posture. As a covered depository institution it falls under
    the CFPB Section 1033 rule scope, but no first-party developer-facing data
    access program is published as of this review.
